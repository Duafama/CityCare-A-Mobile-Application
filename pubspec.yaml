name: city_care
description: "City Care - Keep Your City Clean"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  google_maps_flutter: ^2.3.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  geocoding: ^2.2.1  # 👈 YEH ADD KAREIN
  http: ^1.1.0
  #profanity_filter: ^2.0.0 comment moderation
  safe_text: ^2.1.3
  flutter:
  
  


    sdk: flutter
  intl: ^0.19.0 
  cupertino_icons: ^1.0.8
  google_fonts: ^5.1.0

  


     
  fl_chart: ^1.1.1 # check latest version on pub.dev
  image_picker: ^0.8.7+6
   # Firebase - Latest compatible versions
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  # Stripe Payment Packages
  flutter_stripe: ^12.0.2    # Stripe SDK
  
  
  google_generative_ai: ^0.4.6  # Google Gemini AI
  # Optional but recommended
  flutter_dotenv: ^5.1.0  
  provider: ^6.0.5
     
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true
  
  # Add this assets section for images
  assets:
    - assets/images/
    
    - .env   # Add this line



flutter_native_splash:
  color: "#0F1A3D"
  image: assets/images/splash.jpeg
  android: true
  ios: true 
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#0F1A3D"

